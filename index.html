@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Inter:wght@400;600;800&display=swap');
* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
button { font-family: 'Inter', sans-serif; }
@keyframes amberPulse {
  0%,100% { box-shadow: 0 0 0 2px #E9C86A, 0 0 14px 3px rgba(233,200,106,.5); }
  50%     { box-shadow: 0 0 0 3px #F1D383, 0 0 24px 8px rgba(241,211,131,.85); }
}
@keyframes greenPulse {
  0%,100% { box-shadow: 0 0 0 2px #58D68D, 0 0 12px 3px rgba(88,214,141,.45); }
  50%     { box-shadow: 0 0 0 3px #58D68D, 0 0 20px 7px rgba(88,214,141,.8); }
}
@keyframes redPulse {
  0%,100% { box-shadow: 0 0 0 2px #E0584E, 0 0 12px 3px rgba(224,88,78,.45); }
  50%     { box-shadow: 0 0 0 3px #E0584E, 0 0 20px 7px rgba(224,88,78,.8); }
}
@keyframes popIn { from { transform: translateY(6px) scale(.9); opacity: 0; } to { transform: translateY(0) scale(1); opacity: 1; } }
@keyframes fxFloat {
  0%   { transform: translateY(4px) scale(.8); opacity: 0; }
  15%  { transform: translateY(0) scale(1.05); opacity: 1; }
  75%  { transform: translateY(-4px) scale(1); opacity: 1; }
  100% { transform: translateY(-10px) scale(.95); opacity: 0; }
}
@keyframes dotPulse { 0%,100% { opacity: .35; } 50% { opacity: 1; } }
.rb-amber { animation: amberPulse 1.1s ease-in-out infinite; }
.rb-green { animation: greenPulse 1.1s ease-in-out infinite; }
.rb-red   { animation: redPulse 1.1s ease-in-out infinite; }
.rb-pop   { animation: popIn .22s ease-out; }
.rb-fx    { animation: fxFloat 1.6s ease-out forwards; }
